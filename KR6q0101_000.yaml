front:
  text: 禪關策進序禪曷為有關乎道無內外無出入而人之為道也有迷悟於是大知識關吏不得不時其啓閉慎其鎖鑰嚴其勘核俾異言服私越度者無所售其奸而關之不易透亦已久矣豫初出家得一帙於坊間曰禪門佛祖綱目中所載多古尊宿自敘其參學時始之難入中之做工夫經歷勞苦次第與終之廓爾神悟心愛之慕之願學焉既而此書於他處更不再見乃續閲五燈諸語録雜傳無論緇素但實參實悟者併入前帙刪繁取要彙之成編易名曰禪關策進居則置案行則携囊一覽之則心志激勵神采煥發勢自鞭逼前進或曰是編也為未過關者設也已過關者長往矣將安用之雖然關之外有重關焉託僞於雞聲暫離於虎口得少為足是為增上慢人水未窮山未盡警策在手疾驅而長馳破最後之幽關徐而作罷參齊未晚也萬曆二十八年歲次庚子孟春日雲棲袾宏識
