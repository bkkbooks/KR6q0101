body:
  text: 後學雲棲寺沙門袾宏輯前集二門諸祖法語節要第一諸祖法語今不取向上玄談唯取做工夫喫緊處又節其要略以便時時省覽激勵身心次二諸祖苦功後集諸經引證俱倣此筠州黃檗運禪師示衆預前若打不徹臘月三十日到來管取爾熱亂有般外道才見人做工夫便冷笑猶有這箇在我且問爾忽然臨命終時爾將何抵敵生死須是閒時辦得下忙時得用多少省力休待臨渴掘井做手腳不迭前路茫茫胡鑽亂撞苦哉苦哉平日只學口頭三昧說禪說道呵佛罵祖到這裏都用不著只管瞞人爭知今日自瞞了也勸爾兄弟家趁色力康健時討取箇分曉這些關棙子甚是容易自是爾不肯去下死志做工夫只管道難了又難若是丈夫漢看箇公案僧問趙州狗子還有佛性也無州云無但二六時中看箇無字晝參夜參行住坐臥著衣吃飯處屙屎放尿處心心相顧猛著精彩守箇無字日久歲深打成一片忽然心華頓發悟佛祖之機便不被天下老和尚舌頭瞞便會開大口達磨西來無風起浪世尊拈花一場敗闕到這裏說甚閻羅老子千聖尚不奈爾何不信道直有這般奇特為甚如此事怕有心人評曰此後代提公案看話頭之始也然不必執定無字或無字或萬法或須彌山或死了燒了等或參究念佛隨守一則以悟為期所疑不同悟則無二趙州諗禪師示衆汝但究理坐看三二十年若不會截取老僧頭去老僧四十年不雜用心除二時粥飯是雜用心處玄沙備禪師示衆夫學般若菩薩具大根器有大智慧始得若根機遲鈍直須勤苦忍耐日夜忘疲如喪考妣相似恁麼急切更得人荷挾剋骨究實不妨亦得覯去鵝湖大義禪師垂誡莫只忘形與死心此箇難醫病最深直須提起吹毛利要剖西來第一義瞪却眼兮剔起眉反覆看渠渠是誰若人靜坐不用功何年及第悟心空永明壽禪師垂誡學道之門別無奇特只要洗滌根塵下無量劫來業識種子汝等但能消除情念斷絶妄緣對世間一切愛欲境界心如木石相似直饒未明道眼自然成就淨身若逢真正導師切須勤心親近假使參而未徹學而未成歷在耳根永為道種世世不落惡趣生生不失人身才出頭來一聞千悟黃龍死心新禪師小參諸上座人身難得佛法難聞此身不向今生度更向何生度此身爾諸人要參禪麼須是放下著放下箇甚麼放下箇四大五蘊放下無量劫來許多業識向自己腳跟下推窮看是甚麼道理推來推去忽然心華發明照十方剎可謂得之於心應之於手便能變大地作黃金攪長河為酥酪豈不暢快平生莫只管冊子上念言念語討禪討道禪道不在冊子上縱饒念得一大藏教諸子百家也只是閒言語臨死之時總用不著評曰不可見恁麼說便謗經毀法蓋此語為著文字而不修行者戒也非為不識一丁者立赤幟也東山演禪師送徒行腳須將生死二字貼在額頭上討取箇分曉如只隨群作隊打哄過日他時閻老子打算飯錢莫道我不曾說與爾來若是做工夫須要時時檢點刻刻提撕那裏是得力處那裏是不得力處那裏是打失處那裏是不打失處有一等才上蒲團便打瞌睡及至醒來胡思亂想才下蒲團便說雜話如此辦道直至彌勒下生也未得入手須是猛著精彩提箇話頭晝參夜參與他廝捱不可坐在無事甲裏又不可蒲團上死坐若雜念轉鬪轉多輕輕放下下地走一遭再上蒲團開兩眼揑兩拳竪起脊梁依前提起話頭便覺清涼如一鍋沸湯攙一杓冷水相似如此做工夫定有到家時節佛跡頤菴真禪師普說信有十分疑有十分疑有十分悟有十分可將平生所見所聞惡知惡解奇言妙句禪道佛法貢高我慢等心徹底傾瀉只就未明未了的公案上距定腳頭竪起脊梁無分晝夜直得東西不辨南北不分如有氣的死人相似心隨境化觸著還知自然念慮內忘心識路絶忽然打破髑髏元來不從他得那時豈不慶快平生者哉徑山大慧杲禪師答問今時有自眼不明只管教人死獦狚地休去歇去又教人隨緣管帶忘情默照又教人是事莫管如是諸病枉用工夫無有了期但只存心一處無有不得者時節因緣到來自然觸著磕著噴地醒去把自家心識緣世間塵勞的回來底在般若上縱今生打未徹臨命終時定不為惡業所牽來生出頭定在般若中見成受用此是決定的事無可疑者但自時時提撕妄念起時亦不必將心止遏只看箇話頭行也提撕坐也提撕提撕來提撕去沒滋味那時便是好處不得放捨忽然心華發明照十方剎便能於一毛端現寶王剎坐微塵裏轉大法輪評曰師自云他人先定而後慧某甲先慧而後定蓋話頭疑破所謂休去歇去者不期然而然矣蒙山異禪師示衆某年二十知有此事至三十二請益十七八員長老問他做工夫都無端的後參皖山長老教看無字十二時中要惺惺如猫捕鼠如雞抱卵無令間斷未透徹時如鼠咬棺材不可移易如此做去定有發明時節於是晝夜孜孜體究經十八日吃茶次忽會得世尊拈花迦葉微笑不勝歡喜求決三四員長老俱無一語或教只以海印三昧一印印定餘俱莫管便信此說過了二載景定五年六月在四川重慶府患痢晝夜百次危劇瀕死全不得力海印三昧也用不得從前解會的也用不得有口說不得有身動不得有死而已業緣境界俱時現前怕怖慞惶衆苦交逼遂強作主宰分付後事高著蒲團裝一爐香徐起坐定默禱三寶龍天悔過從前諸不善業若大限當盡願承般若力正念托生早早出家若得病愈便棄俗為僧早得悟明廣度後學作此願已提箇無字回光自看未久之間臟腑三四回動只不管他良久眼皮不動又良久不見有身只話頭不絶至晚方起病退一半復坐至三更四點諸病盡退身心輕安八月至江陵落髮一年起單行腳途中炊飯悟得工夫須是一氣做成不可斷續到黃龍歸堂第一次睡魔來時就座抖擻精神輕輕敵退第二次亦如是退第三次睡魔重時下地禮拜消遣再上蒲團規式已定便趁此時打併睡魔初用枕短睡後用臂後不放倒身過二三夜日夜皆倦腳下浮逼逼地忽然眼前如黑雲開自身如新浴出一般清快心下疑團愈盛不著用力綿綿現前一切聲色五欲八風皆入不得清淨如銀盆盛雪相似如秋空氣肅相似却思工夫雖好無可決擇起單入浙在路辛苦工夫退失至承天孤蟾和尚處歸堂自誓未得悟明斷不起單月餘工夫復舊其時遍身生瘡亦不顧捨命趁逐工夫自然得力又做得病中工夫因赴齊出門提話頭而行不覺行過齊家又做得動中工夫到此却似透水月華急灘之上亂波之中觸不散蕩不失活鱍鱍地三月初六日坐中正舉無字首座入堂燒香打香盒作聲忽然㘞地一聲識得自己捉敗趙州遂頌云沒興路頭窮踏翻波是水超群老趙州面目只如此秋間臨安見雪巖退耕石坑虛舟諸大老舟勸往皖山山問光明寂照遍河沙豈不是張拙秀才語某開口山便喝出自此行坐飲食皆無意思經六箇月次年春因出城回上石梯子忽然胸次疑礙氷釋不知有身在路上行乃見山山又問前語某便掀倒禪床却將從前數則極誵訛公案一一曉了諸仁者參禪大須仔細山僧若不得重慶一病幾乎虛度要緊在遇正知見人所以古人朝參暮請決擇身心孜孜切切究明此事評曰他人因病而退惰此老帶病精修終成大器豈徒然哉禪人病中當以是痛自勉勵楊州素菴田大士示衆近來篤志參禪者少才參箇話頭便被昏散二魔纏縛不知昏散與疑情正相對治信心重則疑情必重疑情重則昏散自無處州白雲無量滄禪師普說二六時中隨話頭而行隨話頭而住隨話頭而坐隨話頭而臥心如棘栗蓬相似不被一切人我無明五欲三毒等之所吞噉行住坐臥通身是箇疑團疑來疑去終日呆樁樁地聞聲覩色管取㘞地一聲去在四明用剛軟禪師答禪人書做工夫須要起大疑情汝工夫未有一月半月成片若真疑現前撼搖不動自然不怕惑亂秖管勇猛忿去終日如呆的漢子相似到恁麼時不怕甕中走鱉袁州雪巖欽禪師普說時不待人轉眼便是來生何不趁身強力健打教徹去討教明白去何幸又得在此名山大澤神龍世界祖師法窟僧堂明淨粥飯清潔湯火穩便若不向這裏打教徹討教明白去是爾自暴自棄自甘陸沈為下劣愚癡之漢若果是茫無所知何不博問先知凡遇五參見曲彔床上老漢橫說竪說何不歷在耳根反覆尋思畢竟是箇甚麼道理山僧五歲出家在上人侍下見與賓客交談便知有此事便信得及便學坐禪十六為僧十八行腳在雙林遠和尚會下打十方從朝至暮不出戶庭縱入衆寮至後架袖手當胸不左右顧目前所視不過三尺初看無字忽於念頭起處打一箇返觀這一念當下氷冷直是澄澄湛湛不動不搖過一日如彈指頃都不聞鐘鼓之聲十九在靈隱掛搭見處州來書記說欽禪爾這工夫是死水不濟事動靜二相打作兩橛參禪須是起疑情小疑小悟大疑大悟被州說得著便改了話頭看箇乾屎橛一味東疑西疑橫看竪看却被昏散交攻頃刻潔淨也不能得移單過淨慈結甲七箇兄弟坐禪封被脅不沾席外有修上座每日在蒲團上如箇鐵鐝子相似地上行時開兩眼垂兩臂亦如箇鐵鐝子相似要與親近說話更不可得因兩年不倒身捱得昏困遂一放都放了兩月後從前整頓得這一放十分精神元來要究明此事不睡也不得須是到中夜熟睡一覺方有精神一日廊下見修方得親近却問去年要與爾說話只管避我如何修云真正辦道人無剪爪之工更與爾說話在因問即今昏散打屏不去修道爾自不猛烈須是高著蒲團竪起脊梁盡渾身併作一箇話頭更討甚昏散依修做工夫不覺身心俱忘清清三晝夜兩眼不交睫第三日午後在三門下如坐而行又撞見修問爾在此做甚麼答云辦道修云爾喚甚麼作道遂不能對轉加迷悶即欲歸堂坐禪又撞見首座道爾但大開了眼看是甚麼道理又被提這一句只欲歸堂才上蒲團面前豁然一開如地陷一般是時呈似人不得非世間一切相可喻便下單尋修修見便道且喜且喜握手門前柳堤上行一轉俯仰天地間森羅萬象眼見耳聞向來所厭所棄之物與無明煩惱元來都是自己妙明真性中流出半月餘動相不生可惜不遇大手眼尊宿不合向這裏坐住謂之見地不脫礙正知見每於睡著時打作兩橛公案有義路者則理會得如銀山鐵壁者却又不會雖在無準先師會下多年入室升座無一語打著心下事經教語録上亦無一語可解此病如是礙在胸中者十年一日在天目佛殿上行擡眼見一株古柏觸目省發向來所得境界礙膺之物撲然而散如暗室中出在白日從此不疑生不疑死不疑佛不疑祖始得見徑山老人立地處好與三十拄杖天目高峯妙禪師示衆此事只要當人的有切心才有切心真疑便起疑來疑去不疑自疑從朝至暮粘頭綴尾打成一片撼亦不動趁亦不去昭昭靈靈常現在前此便是得力時也更須確其正念慎無二心至於行不知行坐不知坐寒熱饑渴悉皆不知此境界現前即是到家消息也巴得搆也撮得著只待時刻而已却不得見恁麼說起一念精進心求之又不得將心待之又不得縱之棄之但自堅凝正念以悟為則當此之時有八萬四千魔軍在汝六根門頭伺候一切奇異善惡等事隨汝心現汝若瞥起毫釐著心便墮他圈繢被他作主受他指揮口說魔話身行魔事般若正因從茲永絶菩提種子不復生芽但莫起心如箇守尸鬼子守來守去疑團子歘然爆地一聲管取驚天動地某甲十五出家二十更衣入淨慈立三年死限學禪初參斷橋和尚令參生從何來死從何去意分兩路心不歸一後見雪巖和尚教看無字又令每日上來一轉如人行路日日要見工程因見說得有序後竟不問做處一入門便問誰與爾拖這死尸來聲未絶便打出次後徑山歸堂夢中忽憶萬法歸一一歸何處自此疑情頓發直得東西不辨南北不分第六日隨衆閣上諷經擡頭忽覩五祖演和尚真贊末兩句云百年三萬六千朝返覆元來是這漢日前拖死尸句子驀然打破直得魂飛膽喪絶後再蘇何啻放下百二十斤擔子其時正二十四歲滿三年限次後被問日間浩浩作得主麼答曰作得又問睡夢中作得主麼答云作得又問正睡著無夢時主在何處於此無言可對無理可伸和尚囑云從今不要爾學佛學法窮古窮今只饑來吃飯困來打眠才眠覺來抖擻精神我這一覺主人公畢竟在甚麼處安身立命自誓𢬵一生做箇癡呆漢定要見這一著子明白經及五年一日睡覺正疑此事忽同宿道友推枕子落地作聲驀然打破疑團如在網羅中跳出所有佛祖誵訛公案古今差別因緣無不了了自此安邦定國天下太平一念無為十方坐斷評曰前示衆做工夫一段至為切要學者宜書諸紳其自敘中所云饑來吃飯困來打眠是發明以後事莫錯會好鐵山璦禪師普說山僧十三歲知有佛法十八出家二十二為僧先到石霜記得祥菴主教時時觀見鼻頭白遂得清淨後有僧自雪巖來寫得巖坐禪針看我做工夫却不曾從這裏過因到雪巖依彼所說做工夫單提無字至第四夜通身汗流十分清爽繼得歸堂不與人說話專一坐禪後見妙高峯教十二時中莫令有間四更起來便摸索話頭頓在面前略覺困睡便起身下地也是話頭行時步步不離話頭開單展鉢拈匙放箸隨衆等事總不離話頭日間夜間亦復如是打成片段未有不發明者依峯開示做工夫果得成片三月二十日巖上堂云兄弟家久在蒲團上瞌睡須下地走一遭冷水盥嗽洗開兩眼再上蒲團竪起脊梁壁立萬仞單提話頭如是用功七日決定悟去此是山僧四十年前已用之工某即依彼所說便覺工夫異常第二日兩眼欲閉而不能閉第三日此身如在虛空中行第四日曾不知有世間事其夜倚欄杆少立泯然無知檢點話頭又不打失轉身上蒲團忽覺從頭至足如劈破髑髏相似如萬丈井底被提在空中相似此時無著歡喜處舉似巖巖云未在更去做工夫求得法語末後云紹隆佛祖向上事腦後依前缺一槌心下道如何又缺一槌不信此語又似有疑終不能決每日堆堆坐禪將及半載一日因頭痛煎藥遇覺赤鼻問那吒太子拆骨還父拆肉還母話記得被悟知客問不能對忽然打破這疑團後到蒙山山問參禪到甚麼處是畢工處遂不知頭山教再做定力工夫洗蕩塵習每遇入室下語只道缺在一日晡時坐至更盡以定力挨拶直造幽微出定見山說此境已山問那箇是爾本來面目正欲下語山便閉門自此工夫日有妙處蓋以離巖太早不曾做得細密工夫幸遇本色宗匠乃得到此元來工夫做得緊峭則時時有悟入步步有剝落一日見壁上三祖信心銘云歸根得旨隨照失宗又剝了一層山云箇事如剝珠相似愈剝愈光愈明愈淨剝一剝勝他幾生工夫也但下語猶只道缺在一日定中忽觸著缺字身心豁然徹骨徹髓如積雪卒然開霽忍俊不禁跳下地來擒住山云我缺少箇甚麼山打三掌某禮三拜山云鐵山這一著子幾年今日方了暫時話頭不在如同死人一切境界逼迫臨身但將話頭與之抵當時時檢點話頭動中靜中得力不得力又定中不可忘却話頭忘話頭則成邪定不得將心待悟不得文字上取解會不得些少覺觸以為了事但教如癡如呆去佛法世法打成一片施為舉措只是尋常惟改舊時行履處古云大道從來不屬言擬談玄妙隔天淵直須能所俱忘却始可饑餐困則眠天目斷崖義禪師示衆若要超凡入聖永脫塵勞直須去皮換骨絶後再蘇如寒灰發焰枯木重榮豈可作容易想我在先師會下多年每被大棒無一念遠離心直至今日觸著痛處不覺淚流豈似爾等咬著些子苦味便掉頭不顧天目中峯本禪師示衆先師高峯和尚教人惟以所參話頭蘊之於懷行也如是參坐也如是參參到用力不及處留意不得時驀忽打脫方知成佛其來舊矣這一著子是從上佛祖了生脫死之已驗三昧惟貴信得及久遠不退轉更無有不獲其相應者看話頭做工夫最是立腳穩當悟處親切縱此生不悟但信心不退不隔一生兩生更無不獲開悟者或三十年二十年未即開悟不須別求方便但心不異緣意絶諸妄孜孜不捨只向所參話上立定腳頭𢬵取生與同生死與同死誰管三生五生十生百生若不徹悟決定不休有此正因不患大事之不了明也病中做工夫也不要爾精進勇猛也不要爾撐眉努目但要爾心如木石意若死灰將四大幻身撇向他方世界之外由他病也得活也得死也得有人看也得無人看也得香鮮也得臭爛也得醫得健來活到一百二十歲也得如或便死被宿業牽入鑊湯爐炭裏也得如是境界中都不動搖但切切將箇沒滋味話頭向藥爐邊枕頭上默默咨參不得放捨評曰此老千言萬語只教人看話頭做真實工夫以期正悟諄切透快千載而下如耳提面命具存全書自應遍覽師子峯天如則禪師普說生不知來處謂之生大死不知去處謂之死大臘月三十日到來只落得手忙腳亂何況前路茫茫隨業受報正是要緊事在這箇是生死報境若論生死業根即今一念隨聲逐色使得七顛八倒者便是由是佛祖運大慈悲或教爾參禪或教爾念佛令汝掃除妄念認取本來面目做箇灑灑落落大解脫漢而今不獲靈驗者有三種病第一不遇真善知識指示第二不能痛將生死大事為念悠悠漾漾不覺打在無事甲裏第三於世間虛名浮利照不破放不下妄緣惡習上坐不斷擺不脫境風扇動處不覺和身輥入業海中東飄西泊去真正道流豈肯恁麼當信祖師道雜念紛飛如何下手一箇話頭如鐵掃轉掃轉多轉多轉掃掃不得命掃忽然掃破太虛空萬別千差一路通諸禪德努力今生須了却莫教永劫受餘殃又有自疑念佛與參禪不同不知參禪只圖識心見性念佛者悟自性彌陀唯心淨土豈有二理經云憶佛念佛現前當來必定見佛既曰現前見佛則與參禪悟道有何異哉答或問云但將阿彌陀佛四字做箇話頭二六時中直下提撕至於一念不生不涉階梯徑超佛地智徹禪師淨土玄門念佛一聲或三五七聲默默返問這一聲佛從何處起又問這念佛的是誰有疑只管疑去若問處不親疑情不切再舉箇畢竟這念佛的是誰於前一問少問少疑只向念佛是誰諦審諦問評曰徑無前問只看這念佛的是誰亦得汝州香山無聞聰禪師普說山僧初見獨翁和尚令參不是心不是佛不是物後同雲峯月山等六人立願互相究竟次見淮西教無能令提無字次到長蘆結伴煉磨後遇淮上敬兄問云爾六七年有甚見地某答每日只是心下無一物敬云爾這一絡索甚處出來某心裏似知不知不敢開口敬見我做處無省發乃云爾定中工夫不失動處便失某被說著心驚便問畢竟明此大事應作麼生敬云爾不聞川老子道要知端的意北斗面南看說了便去某被一問直得行不知行坐不知坐五七日間不提無字倒只看要知端的意北斗面南看忽到淨頭寮在一木上與衆同坐只是疑情不解有飯食頃頓覺心中空亮輕清見情想破裂如剝皮相似目前人物一切不見猶如虛空半昧省來通身汗流便悟得北斗面南看遂見敬下語作頌都無滯礙尚有向上一路不得灑落後入香巖山中過夏被蚊子咬兩手不定因念古人為法忘軀何怖蚊子盡情放下咬定牙關揑定拳頭單提無字忍之又忍不覺身心歸寂如一座屋倒却四壁體若虛空無一物可當情辰時一坐未時出定自知佛法不誤人自是工夫不到然雖見解明白尚有微細隱密妄想未盡又入光州山中習定六年陸安山中又住六年光州山中又住三年方得頴脫評曰古人如是勤辛如是久遠方得相應今人以聰明情量剎那領會而猶欲自附於頓悟豈不謬哉獨峯和尚示衆學道之士那裏是入手處提箇話頭是入手處般若和尚示衆兄弟家三年五年做工夫無箇入處將從前話頭拋却不知行到中途而廢可惜前來許多心機有志之士看衆中柴乾水便僧堂溫暖發願三年不出門決定有箇受用有等才做工夫心地清淨但見境物現前便成四句將謂是大了當人口快舌便誤了一生三寸氣消將何保任佛子若欲出離參須直參悟須實悟或話頭綿密無有間斷不知有身謂之人忘法未忘有到此忘其本身忽然記得如在夢中跌下萬仞洪崖只顧救命遂成風癲到此須是緊提話頭忽然連話頭都忘謂之人法雙忘驀地冷灰豆爆始知張公吃酒李公醉正好來般若門下吃棒何以故更須打破諸祖重關遍參知識得知一切淺深却向水邊林下保養聖胎直待龍天推出方可出來扶揚宗教普度群生雪庭和尚示衆十二時中一貧如洗看箇父母未生前那箇是我本來面目不管得力不得力昏散不昏散只管提撕去仰山古梅友禪師示衆須要發勇猛心立決定志將平生悟得的學得的一切佛法四六文章語言三昧一掃掃向大洋海裏去更莫舉著把八萬四千微細念頭一坐坐斷却將本參話頭一提提起疑來疑去拶來拶去凝定身心討箇分曉以悟為則不可向公案上卜度經書上尋覓直須卒地斷爆地拆方始到家若是話頭提不起連舉三遍便覺有力若身力疲倦心識怉懆却輕輕下地打一轉再上蒲團將本參話如前挨拶若才上蒲團便打磕睡開得眼來胡思亂想轉身下地三三兩兩交頭接耳大語細話記取一肚皮語録經書逞能舌辨如此用心臘月三十日到來總用不著衢州傑峯愚禪師示五臺善講主假饒文殊放金色光與汝摩頂師子被爾騎來觀音現千手眼鸚哥被爾捉得皆是逐色隨聲於爾自己有何利益要明己躬大事透脫生死牢關先須截斷一切聖凡虛妄見解十二時中回光返照但看箇不是心不是物不是佛是箇甚麼切莫向外邊尋討設有一毫佛法神通聖解如粟米粒大皆為自欺總是謗佛謗法直須參到脫體無依纖毫不立處著得隻眼便見青州布衫鎮州蘿蔔皆是自家所用之物更不須別求神通聖解也靈隱瞎堂禪師對制宋孝宗皇帝問如何免得生死對曰不悟大乘道終不能免又問如何得悟對曰本有之性以歲月磨之無不悟者大乘山普巖斷岸和尚示衆萬法歸一一歸何處不得不看話頭守空靜而坐不得念話頭無疑而坐如有昏散不用起念排遣快便舉起話頭抖擻身心猛著精采更不然下地經行覺昏散去再上蒲團忽爾不舉自舉不疑自疑行不知行坐不知坐惟有參情孤孤逈逈歷歷明明是名斷煩惱處亦名我喪處雖然如是未為究竟再加鞭策看箇一歸何處到這裏提撕話頭無節次了也惟有疑情忘即舉之直至返照心盡是名法亡始到無心處也莫是究竟麼古云莫謂無心云是道無心猶隔一重關忽地遇聲遇色磕著撞著大笑一聲轉身過來便好道懷州牛吃禾益州馬腹脹古拙禪師示衆諸大德何不起大精進對三寶前深發重願若生死不明祖關不透誓不下山向長連床上七尺單前高掛鉢囊壁立千仞盡此一生做教徹去若辦此心決不相賺如其發心不真志不猛勵這邊經冬那邊過夏今日進前明日退後久久摸索不著便道般若無靈驗却向外邊記一肚抄一部如臭糟瓶相似聞者未免惡心嘔吐直做到彌勒下生有何干涉苦哉太虛禪師示衆如未了悟須向蒲團上冷坐十年二十年三十年看箇父母未生前面目楚石琦禪師示衆兄弟開口便道我是禪和及問他如何是禪便東覷西覷口如扁擔相似苦哉屈哉喫著佛祖飯不去理會本分事爭持文言俗句高聲大語略無忌憚全不識羞有般底不去蒲團上究明父母未生以前本來面目冷地裏學客舂指望求福懺除業障與道太遠在凝心斂念攝事歸空念想才生即便遏捺如此見解即是落空亡的外道魂不返的死人又有妄認能嗔能喜能見能聞認得明白了便是一生參學事畢我且問爾無常到時燒作一堆灰這能嗔能喜能見能聞的什麼處去也恁麼參的是藥汞銀禪此銀非真一煆便流因問爾尋常參箇什麼答道有教參萬法歸一一歸何處又教我只如此會今日方知不是就和尚請箇話頭我道古人公案有什麼不是汝眼本正因師故邪纍請不已向道去參狗子無佛性話忽然打破漆桶却來山僧手裏喫棒評曰天如而下皆元末及國初尊宿若傑峯古拙楚石則身經二代者也楚石為妙喜五世孫而其見地如日光月明機辨如雷烈風迅直截根原脫落枝葉真無愧妙喜老人矣天如以至今日無四休者獨其語皆提持向上極則事教初學人做工夫處絶少僅得一二録如左高麗普濟禪師答李相國書既曾於無字話提撕不必改參也況舉起別話頭時曾參無字必於無字有小熟因地切莫移動切莫改參但於二六時中四威儀內舉起話頭莫待幾時悟不悟亦莫管有滋味無滋味亦莫管得力不得力拶到心思不及意慮不行即是諸佛諸祖放身命處評曰此語録萬曆丁酉福建許元真東征得之朝鮮者中國未有也因録其要而識之楚山琦禪師解制諸大德九十日中還曾證悟也無如其未悟則此一冬又是虛喪了也若是本色道流以十方法界為箇圓覺期莫論長期短期百日千日結制解制但以舉起話頭為始若一年不悟參一年十年不悟參十年二十年不悟參二十年盡平生不悟決定不移此志直須要見箇真實究竟處方是放參之日也如未能言前契旨但將一句阿彌陀佛置之懷抱默默體究常時鞭起疑情這念佛的是誰念念相續心心無間如人行路到水窮山盡處自然有箇轉身的道理㘞地一聲契入心體評曰舉起話頭為進期真實究竟為出期當牢記取天真毒峯善禪師示衆果欲了脫生死先須發大信心立弘誓願若不打破所參公案洞見父母未生前面目坐斷微細現行生死誓不放捨本參話頭遠離真善知識貪逐名利若故違此願當墮惡道發此大願防護其心方堪領受公案或看無字要緊在因甚狗子無佛性上著力或看萬法歸一要緊在一歸何處或參究念佛要緊在念佛的是誰回光返照深入疑情若話頭不得力還提前文以至末句使首尾一貫方有頭緒可致疑也疑情不斷切切用心不覺舉步翻身打箇懸空筋斗却再來吃棒空谷隆禪師示衆不可呆蠢蠢地念箇話頭亦不可推詳計較但時中憤然要明此事忽爾懸崖撒手打箇翻身方見孤明歷歷到此不可耽著還有腦後一槌極是難透爾且恁麼參去不參自悟上古或有之自餘未有不從力參而得悟者優曇和尚令提念佛的是誰汝今不必用此等法只平常念去但念不忘忽然觸境遇緣打著轉身一句始知寂光淨土不離此處阿彌陀佛不越自心評曰但時中憤然要明此事此句甚妙該攝看話頭之法曲盡天奇和尚示衆汝等從今發決定心晝三夜三舉定本參看他是箇甚麼道理務要討箇分曉日久歲深不煉昏沈昏沈自退不除散亂散亂自絶純一無雜心念不生忽然會得如夢而醒覆看從前俱是虛幻當體本來現成萬象森羅全機獨露於這大明國裏也不枉為人向此法門也不枉為僧却來隨緣度日豈不暢哉豈不快哉終日念佛不知全是佛念如不知須看箇念佛的是誰眼就看定心就舉定務要討箇下落評曰毒峯天奇皆教參究念佛空谷何故謂不必用此等法蓋是隨機不同任便無礙古音琴禪師示衆坐中所見善惡皆由坐時不起觀察不正思惟但只瞑目靜坐心不精采意順境流半夢半醒或貪著靜境為樂致見種種境界夫正因做工夫者當睡便睡一覺一醒便起抖擻精神挪挲眼目咬住牙根揑緊拳頭直看話頭落在何處切莫隨昏隨沈絲毫外境不可采著行住坐臥之中一句彌陀莫斷須信因深果深直教不念自念若能念念不空管取念成一片當念認得念人彌陀與我同現異巖登禪師釋疑集問學人參求知識或令提箇話頭或令疑箇話頭同耶別耶答才舉話頭當下便疑豈有二理一念提起疑情即現覆去翻來精研推究功深力極自得了悟評曰釋疑集中此一段文最為精當今人頗有滯此二端而不決者蓋未曾實做工夫故也月心和尚示衆憤起新鮮志氣舉箇話頭要於結末字上疑情永長沈沈痛切或杜口默參或出聲追審如失重物務要親逢親得日用中一切時一切處更無二念諸祖苦功節略第二獨坐靜室道安大師獨坐靜室十有二年𭮠精搆思乃得神悟評曰此老竭精思乃得神悟不是一味靜坐便了懸崖坐樹靜琳禪師棄講習禪昏睡惑心有懸崖下望千仞旁出一樹以草藉之趺坐其上一心繫念動經宵日怖死既重專精不二後遂超悟草食木棲通達禪師入太白山不齎糧粒饑則食草息則依樹端坐思玄五年不息因以本打塊塊破廓然大悟評曰饒汝草食樹棲若不思玄漫爾多載異於深山之野人者幾希衣不解帶金光照禪師十三出家十九入洪陽山依迦葉和尚服勤三載衣不解帶寢不沾席又在姑射山亦如是豁然啓悟引錐自刺慈明谷泉琅瑘三人結伴參汾陽時河東苦寒衆人憚之慈明志在於道曉夕不忘夜坐欲睡引錐自刺後嗣汾陽道風大振號西河師子暗室不忽宏智禪師初侍丹霞淳因與僧徵詰公案不覺大笑淳責曰汝笑這一聲失了多少好事不見道暫時不在如同死人智再拜伏膺後雖在暗室未嘗敢忽評曰論道而笑古人尚呵今世諦詼諧捧腹無厭丹霞見之又當何如晚必涕泣伊菴權禪師用功甚鋭至晚必流涕曰今日又只恁麼空過未知來日工夫如何師在衆不與人交一言三年力行晦堂心禪師自言初入道自恃甚易逮見黃龍先師退思日用與理矛盾極多遂力行之三年祈寒溽暑確志不移方得事事如理而今咳唾掉臂也是祖師西來意圓枕警睡哲侍者睡以圓木為枕小睡則枕轉覺而復起率以為常或謂用心太過答云我於般若緣分素薄若不如此恐為妄習所牽被雨不覺全菴主為道猛烈無食息暇一日倚欄看狗子話雨來不覺衣濕方知誓不展被佛燈珣禪師依佛鑒隨衆咨請邈無所入嘆曰此生若不徹證誓不展被於是四十九日只靠露柱立地如喪考妣乃得大悟擲書不顧鐵面昺禪師行腳時離鄉未久聞受業一夕遺火悉為煨燼得書擲之地曰徒亂人意耳堅誓省發靈源清禪師初參黃龍心隨衆問答茫然不知端倪夜誓佛前曰當盡形壽以法為檀願早開解後閲玄沙語倦而倚壁起經行步促遺履俯就之忽大悟無時異緣圓悟勤禪師再參東山演為侍者窮參力究自云山僧在衆無一時異緣十年方得打徹評曰十年之間無一時異緣試問今一日間異緣多少何時得打徹去也造次不忘牧菴忠禪師初習台教後志禪宗謁龍門眼造次之頃不忘提撕適縱步水磨見額云法輪常轉忽大悟忘抵河津慶壽享禪師參鄭州普照寶公朝夕精勤一日以事往睢陽過趙渡疑情不散忘其抵津同行覺之曰此河津也豁然悲喜交集以白寶公公曰此僵臥漢未在因教看日面佛語一日雲堂靜坐聞板聲大悟寢食兩忘松源嶽禪師初以居士參應菴華不契愈自奮勵見密菴傑隨問隨答密嘆曰黃楊木禪耳奮勵彌切至忘寢食會密入室問僧不是心不是佛不是物師從傍大悟口體俱忘高峯妙禪師在衆脅不沾席口體俱忘或時如廁中單而出或時發函不扃而去後徑山歸堂大悟諸緣盡廢傑峯愚禪師初參古崖石門佩受法語晝夜兀坐不契後參止嚴舉不是心不是佛不是物愈疑乃諸緣盡廢寢食俱不覺知如氣絶者一夕坐至夜分聞鄰僧咏證道歌云不除妄想不求真豁然如釋重負有夜半忽然忘月指虛空迸出日輪紅之句杜門力參移剌楚材丞相參萬松老人屏斥家務杜絶人跡雖祈寒溽暑無日不參焚膏繼晷廢寢忘餐者幾三年乃獲印證評曰如是用心如是證道是之謂在家菩薩也喫得肉已飽來尋僧說禪獨何為哉以頭觸柱中峯本禪師侍高峯死關晝夜精勤困則以頭觸柱一日誦金剛經至荷擔如來處恍然開解自謂所證未極彌益勤苦咨決無怠及觀流水乃大悟評曰自謂所證未極故終至極處今之以途路為到家者衆矣嗟夫關中刻苦毒峯善禪師在淯溪進關不設臥榻惟置一橙以悟為則一夕昏睡不覺夜半乃去橙晝夜行立又倚壁睡去誓不傍壁遼空而行身力疲勞睡魔愈重號泣佛前百計逼拶遂得工夫日進聞鍾聲忽不自由偈示沈沈寂寂絶施為觸著無端吼似雷動地一聲消息盡髑髏粉碎夢初回脅不至席璧峯金禪師參晉雲海示以萬法公案疑之三年偶摘蔬次忽凝然久之海問子定耶對曰定動不關海問定動不關是甚麼人金以筐示之海不肯金撲筐於地亦不肯爾後工夫益切脅不至席一坐七日一日聞伐木聲大悟獨守鈍工西蜀無際禪師初做工夫四指大書帖亦不看只是拍盲做鈍工夫乃得大徹大悟評曰此意極是但不明教理者未宜效嚬禪關策進後集一門諸經引證節略大般若經空中聲告常啼菩薩言汝東行求般若莫辭疲倦莫念睡眠莫思飲食莫想晝夜莫怖寒熱於內外法心莫散亂行時不得左右顧視勿觀前後上下四維等華嚴經勤首菩薩偈云如鑽燧取火未出而數息火勢隨至滅懈怠者亦然釋曰當以智慧鑽注一境以方便繩善巧回轉心智無住四儀無間則聖道可生瞥爾起心暫時忘照皆名息也大集月藏經若能精勤繫念不散則休息煩惱不久得成無上菩提十六觀經佛告韋提希應當專心繫念一處出曜經智者以慧鍊心尋究諸垢猶如礦鐵數入百鍊則成精金猶如大海日夜沸動則成大寶人亦如是晝夜役心不止便獲果證評曰今人但知息心而入禪那寧知役心而獲果證大灌頂經禪思比丘無他想念惟守一法然後見心遺教經夫心者制之一處無事不辦評曰守一法制一處幸有此等語言在楞嚴經又以此心內外精研又以此心研究精極彌陀經執持名號一心不亂評曰只此一心不亂四字參禪之事畢矣人多於此忽之楞伽經若欲了知能取所取分別境界皆是心之所現者當離憒閙昏滯睡眠初中後夜勤加修習金剛般若經薩陀波崙菩薩七歲經行住立不坐不臥寶積經佛告舍利弗彼二菩薩行精進時於千歲中未曾一彈指頃被睡眠之所逼惱於千歲中未曾起念稱量飲食醎淡美惡於千歲中每乞食時未曾觀授食人為男為女於千歲中居止樹下未曾仰面觀於樹相於千歲中未曾緣念親里眷屬於千歲中未曾起念我欲剃頭於千歲中未曾起念從熱取涼從寒取溫於千歲中未曾論說世間無益之語評曰此是大菩薩境界雖非凡夫所及然不可不知大集經法悟比丘二萬年中常修念佛無有睡眠不生貪嗔等不念親屬衣食資身之具念佛三昧經舍利弗二十年中常勤修習毗婆舍那行住坐臥正念觀察曾無動亂自在王菩薩經金剛齊比丘修習正法諸魔隱身伺之千歲伺之不見一念心散可得惱亂如來智印經輪王慧起捨國出家三千歲繫念亦不倚臥中阿含經尊者阿那律陀尊者難提尊者金毗羅共住林中後先乞食各歸坐禪至於晡時先從坐起者或汲瓶水能勝獨舉如不能勝則便以手招一比丘兩人共舉各不相語五日一集或兩說法或聖默然評曰此萬世結伴修行之良法也雜譬喻經波羅奈國一人出家自誓不得應真終不臥息晝夜經行三年得道又羅閲祇國一沙門布草為褥坐其上自誓云不得道終不起但欲睡眠以錐刺髀一年之中得應真道雜阿含經如是比丘精勤方便肌膚瘦損筋連骨立不捨善法乃至未得所應得者不捨精進常攝其心不放逸住評曰所應得須知應得者何事據此經則應得盡諸漏證三明六通成聲聞果若今所期則應得圓悟心宗證一切種智成無上佛果阿含經乃至成就三明滅除暗冥得大智明皆由精勤修習樂靜獨居專念不休之所致也評曰專念不休久之則一心不亂法集要領經若人百歲中懈怠劣精進不如一日中勇猛行精進評曰知此義則張善和輩臨終十念往生可了然無疑矣無量壽經至心精進求道不止會當剋果何願不遂一向出生菩薩經阿彌陀佛昔為太子聞此微妙法門奉持精進七千歲中脅不至席意不傾動寶積正法經樂求大乘其心勇猛雖捨身命無所顧惜修菩薩行勤加精進無少懈怠六度集經精進度無極者精存道奧進之無怠臥坐住步喘息不替心心相續不自放逸修行道地經佛言自見宿命從無量劫往返生死其骨過須彌山其髓塗地可遍大千世界其血多於古今天下普雨但欲免斯生死之患晝夜精進求於無為評曰曰求道曰聞此微妙法門曰樂求大乘曰精存道奧曰求於無為如是精進名正精進不然縱勞形苦志纍歲經劫或淪外道或墮偏乘終無益也菩薩本行經直至成佛皆由精進彌勒所問經佛語阿難彌勒發意先我之前四十二劫我於其後乃發道意以大精進超越九劫得於無上正真之道評曰釋迦以後進而頓踰四十二劫之先輩勤惰為之也經言貪著於名利多遊族姓家彌勒之所以先學而後成者坐此則釋迦之棄名利入山林不親近國王大臣可知矣識之哉文殊般若經一行三昧者應處空閒捨諸亂意繫心實理想念一佛念念相續而不懈怠於一念中即能見十方諸佛獲大辨才也般舟三昧經九十日中不坐不臥假使筋斷骨枯三昧不成終不休息評曰以上二條俱指念佛而兼諸法門修淨業者不可不知四十二章經夫為道者譬如一人與萬人戰挂鎧出門意或怯弱或半路而退或格鬪而死或得勝而還沙門學道應當堅持其心精進勇鋭不畏前境破滅衆魔而得道果評曰半路退者自畫而不進者也格鬪死者稍進而無功者也得勝還者破惑而成道者也得勝之由全在堅持其心精進勇鋭學人但當一志直前毋慮退毋畏死前不云乎吾保此人必得道矣法華云吾今為汝保任此事終不虛也佛既爾保何慮何畏觀藥王藥上二菩薩經常念大乘心不忘失勤修精進如救頭然評曰當勤精進如救頭然今叢林早暮持誦然誦其文不思其義明其義不履其事亦何益也寶雲經以心繫心以心住心心專一故次第無間得定心故心常寂靜正法念處經精勤修行則得見諦是故應當曠野寂靜一心正念離於一切多語言說一切親舊知識來去相見阿毗曇集異門足假使我身血肉枯竭唯皮筋骨連柱而存若本所求勝法未獲終不止息為精進故應深受寒熱飢渴蛇蝎蚊虻風雨等觸又應忍受他人所發能生身中猛利辛楚奪命苦受毀辱語言評曰本所求勝法未獲終不止息即宗門所謂本參話頭不破誓不休歇之意也瑜伽師地論六度初三是戒學攝靜慮是心學攝般若是慧學攝唯精進遍於一切大乘莊嚴經論至心學道發大勇猛決趁菩提阿毗達磨論菩薩於底沙佛時合十指掌翹於一足以一伽陀七日七夜嘆佛功德便超九劫評曰觀此則法集所稱一日精進勝百年懈怠信哉言乎西域記脅尊者八十出家少年誚曰夫出家之業一則習禪二則誦經而今衰老何所進取尊者聞而誓曰我若不通三藏經不斷三界欲得六神通具八解脫終不以脅至席乃晝則研習教理夜則靜慮凝神三年悉證所誓時人敬仰號脅尊者評曰矍鑠是翁足為懈怠比丘激勸當知今人豈但八十縱饒直抵期頤尚須努力修進南海寄歸善遇法師念佛四儀無間寸陰非空計小豆粒可盈兩載法苑珠林陳棲霞寺沙門惠布居寺舍利塔西經行坐禪誓不坐臥徒衆八十咸不出院觀心疏夫欲建小事心不決志尚不能成況欲排五住之重關度生死之大海而不勤勞妙道何由可具永嘉集勤求至道不顧形命晝夜行般若生生勤精進常如救頭然溈山警策研窮法理以悟為則評曰則準也以悟為準的也即宗門謂參禪到甚麼處是歇工處今言大悟乃已不悟不已也淨土懺願儀若坐若行皆勿散亂不得彈指頃念世五欲及接對外人語論戲笑亦不得託言延緩放逸睡眠當於瞬息俯仰繫念不斷法界次第倍策精進勤求不息是名精進根心賦堅求至道曉夕亡疲不向外求虛襟澄慮密室靜坐端拱寧神評曰靜業弟子莫見不向外求密室靜坐之說便謂不必念佛須知念字從心佛即自己以自心念自己烏得為外求也況念之不已則成三昧靜密孰加焉重刻禪關策進後序古人曰明窗下古教照心僧堂前坐禪辦道猶如車兩輪始可與祖意相應也大凡無照心之辦道必止小見彼二乘外道并惡知識類是也無辦道之照心悉落學解今教律神儒及祖師禪蓋不出之也是故如真正道人以正坐禪研究根塵以真古教精鍊定慧況至鞭策怠慢激發中止者佛祖先鑑可仰以依行矣吾闡提老翁自從幼聞泥犁苦境頻求解脫已來祈神誓佛水火不怖責身苦心寢食稍廢一朝見法華經因緣譬喻之說錯為不足取失力三四年也十九歲復在禪叢衆寮因見岩頭和尚末後為賊害大叫一聲聞數里外又大失志以為現在之害尚不能轉況於泥犁耶古人秀逸者已如是則我輩何得免脫嗟呼佛法虛誕參禪無實僧也俗也我進無所期退有所羞焉於是改志放意惡見日加次年至濃之瑞雲從事馬翁與溫馬山輩結伴互論詩文一日間坐之次翻然思曰身僧而嗜俗事志俗而預僧倫大丈夫恁麼打過亦有不保處時當晒書之節內外經籍堆在堂上翁竊往禮拜懇禱曰儒佛老莊諸家之道我以何為師願護法天龍示我于正路閉目良久任手把著得一小冊名禪關策進頂受披之即撞著引錐自刺章且其考記曰昔慈明在汾陽時與大愚琅瑘等六七人結伴參究河東苦寒衆人憚之明獨通宵坐不睡自責曰古人刻苦光明必盛大也我又何人生無益于時死不知于人於理有何益即引錐自刺其股翁至此志氣憤激如吞醍醐遂乞求其書於馬翁常為照心辦道之友行住相隨自是踏開岩頭醜面目根塵剝落觸著道鏡惡毒手見知喪盡年過不惑見徹鷲嶺之藏祕齡近耳順闡揚龍峯之家私其道走殺天下衲僧其德驚動王侯士庶者皆出於他囊中所貯一箇之策進者歟是故翁常讚慈明語誡學者曰老僧少時日三復此語而不及也今老焉止哉又曰雲棲一生之文字但此書有補吾宗汝等他日功有餘力再刊行之以報祝融之恨雖然此書間以念佛參究自己是則是甚奪衲僧頴氣落往生門者不少若依老僧意一齊削去可也何故獅子不食雕殘猛虎不餐伏肉往生一機還他淨家衲僧門下實智尚不要何況假名耶驅耕夫之牛奪飢人之食始可以為真參詳而已客歲辛巳冬參學虎上座與同友二三子勠力欲補翁志便有林氏渡氏等之檀信遂捨淨財王成其議於是請豫于加數語以辦來由仍記先所親聞事實許多遠傳之不朽云寶曆十二年龍集壬午孟正月住豆之龍澤東嶺頭陀圓慈恭書
